{% extends 'base.html' %}

{% block content %}

<div class="container mt-4">

<h2 class="text-center mb-4">Available Mock Tests</h2>

<div class="list-group">

    {% for test in tests %}

    <a href="{% url 'start_test' test.id %}" class="list-group-item list-group-item-action">

        <h5 class="mb-1">
            {{ test.course.name }} {{ test.year }}
        </h5>

        <small>
            Duration: {{ test.duration }} minutes
        </small>

    </a>

    {% empty %}

    <div class="alert alert-warning">
        No mock tests available yet.
    </div>

    {% endfor %}

</div>
```

</div>

{% endblock %}

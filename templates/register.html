{% extends 'base.html' %}

{% block content %}

<div class="container mt-5" style="max-width:500px;">

    <h2 class="text-center mb-4">Create Account</h2>

    <!-- Messages -->
    {% if messages %}
        {% for message in messages %}
            <div class="alert alert-warning">
                {{ message }}
            </div>
        {% endfor %}
    {% endif %}

    <form method="POST">
        {% csrf_token %}

        <!-- Username -->
        <div class="mb-3">
            <label class="form-label">Username</label>
            <input type="text" name="username" class="form-control" required>
        </div>

        <!-- Email -->
        <div class="mb-3">
            <label class="form-label">Email</label>
            <input type="email" name="email" class="form-control" required>
        </div>

        <!-- Password -->
        <div class="mb-3">
            <label class="form-label">Password</label>
            <div class="input-group">
                <input type="password" name="password" id="regPassword" class="form-control" required>
                <button class="btn btn-outline-secondary" type="button" onclick="togglePassword('regPassword', 'eyeIconReg')">
                    <i class="bi bi-eye" id="eyeIconReg"></i>
                </button>
            </div>
        </div>

        <!-- Confirm Password -->
        <div class="mb-3">
            <label class="form-label">Confirm Password</label>
            <div class="input-group">
                <input type="password" name="confirm_password" id="regConfirmPassword" class="form-control" required>
                <button class="btn btn-outline-secondary" type="button" onclick="togglePassword('regConfirmPassword', 'eyeIconConfirm')">
                    <i class="bi bi-eye" id="eyeIconConfirm"></i>
                </button>
            </div>
        </div>

        <!-- Register Button -->
        <div class="d-grid">
            <button type="submit" class="btn btn-success">
                Register
            </button>
        </div>

    </form>

    <script>
    function togglePassword(inputId, iconId) {
        const input = document.getElementById(inputId);
        const icon = document.getElementById(iconId);
        if (input.type === 'password') {
            input.type = 'text';
            icon.classList.remove('bi-eye');
            icon.classList.add('bi-eye-slash');
        } else {
            input.type = 'password';
            icon.classList.remove('bi-eye-slash');
            icon.classList.add('bi-eye');
        }
    }
    </script>

    <p class="text-center mt-3">
        Already have an account?
        <a href="{% url 'login' %}">Login here</a>
    </p>

</div>

{% endblock %}

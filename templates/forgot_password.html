{% extends 'base.html' %}

{% block content %}

<div class="row justify-content-center mt-5">
  <div class="col-md-5">

    <div class="card shadow p-4" style="border-radius: 12px;">

      <h2 class="text-center mb-3">Forgot Password?</h2>
      <p class="text-muted text-center mb-4">Enter your registered email address below. We'll send a 6-digit OTP to verify your identity.</p>

      {% if messages %}
        {% for message in messages %}
          <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">
            {{ message }}
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
          </div>
        {% endfor %}
      {% endif %}

      <form method="POST">
        {% csrf_token %}
        <div class="mb-4">
          <label class="form-label fw-bold">Email Address</label>
          <input type="email" name="email" class="form-control form-control-lg" placeholder="example@gmail.com" required>
        </div>

        <div class="d-grid mb-3">
          <button type="submit" class="btn btn-primary btn-lg fw-bold">
            Send Security Code
          </button>
        </div>
      </form>

      <div class="text-center mt-2">
        <a href="{% url 'login' %}" class="text-decoration-none text-muted small"><i class="bi bi-arrow-left"></i> Back to Login</a>
      </div>

    </div>

  </div>
</div>

{% endblock %}

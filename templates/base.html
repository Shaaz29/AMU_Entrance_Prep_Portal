{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>AMU Entrance Prep Portal</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>

<!-- 🔥 RESPONSIVE NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm sticky-top">
  <div class="container">

    <!-- Logo -->
    <a class="navbar-brand fw-bold" href="/">
        AMU Prep
    </a>

    <!-- Mobile Toggle Button -->
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarMenu">
      <span class="navbar-toggler-icon"></span>
    </button>

    <!-- Navbar Items -->
    <div class="collapse navbar-collapse" id="navbarMenu">

      <ul class="navbar-nav ms-auto align-items-lg-center">

        <li class="nav-item">
          <a class="nav-link" href="/">Home</a>
        </li>

        <li class="nav-item">
          <a class="nav-link" href="/mock-tests/">Mock Tests</a>
        </li>

        <li class="nav-item">
          <a class="nav-link" href="/dashboard/">Dashboard</a>
        </li>

        {% if user.is_authenticated %}
        <li class="nav-item ms-lg-3">
          <a class="btn btn-outline-light px-3" href="/logout/">Logout</a>
        </li>
        {% else %}
        <li class="nav-item ms-lg-3">
          <a class="btn btn-primary px-3" href="/login/">Login</a>
        </li>
        {% endif %}

      </ul>
    </div>

  </div>
</nav>


<!-- PAGE CONTENT -->
<div class="container mt-4">
    {% block content %}{% endblock %}
</div>


<!-- FOOTER -->
<footer class="bg-dark text-light text-center py-3 mt-5">
    © 2026 AMU Entrance Prep Portal
</footer>


<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>

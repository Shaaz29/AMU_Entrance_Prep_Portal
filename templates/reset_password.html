{% extends 'base.html' %}

{% block content %}

<div class="row justify-content-center mt-5">
  <div class="col-md-5">

    <div class="card shadow p-4" style="border-radius: 12px;">

      <h2 class="text-center mb-3">Create New Password</h2>
      <p class="text-muted text-center mb-4">Your identity has been verified. Please set a strong, new password below.</p>

      {% if messages %}
        {% for message in messages %}
          <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">
            {{ message }}
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
          </div>
        {% endfor %}
      {% endif %}

      <form method="POST">
        {% csrf_token %}
        <div class="mb-3">
          <label class="form-label fw-bold">New Password</label>
          <div class="input-group">
            <input type="password" name="password" id="resetPassword" class="form-control" placeholder="Minimum 8 characters" required>
            <button class="btn btn-outline-secondary" type="button" onclick="togglePassword('resetPassword', 'eyeIconReset1')">
                <i class="bi bi-eye" id="eyeIconReset1"></i>
            </button>
          </div>
        </div>

        <div class="mb-4">
          <label class="form-label fw-bold">Confirm New Password</label>
          <div class="input-group">
            <input type="password" name="confirm_password" id="resetConfirmPassword" class="form-control" required>
            <button class="btn btn-outline-secondary" type="button" onclick="togglePassword('resetConfirmPassword', 'eyeIconReset2')">
                <i class="bi bi-eye" id="eyeIconReset2"></i>
            </button>
          </div>
        </div>

        <div class="d-grid mb-3">
          <button type="submit" class="btn btn-warning btn-lg fw-bold text-dark">
            Securely Update Password
          </button>
        </div>
      </form>

      <script>
      function togglePassword(inputId, iconId) {
          const input = document.getElementById(inputId);
          const icon = document.getElementById(iconId);
          if (input.type === 'password') {
              input.type = 'text';
              icon.classList.remove('bi-eye');
              icon.classList.add('bi-eye-slash');
          } else {
              input.type = 'password';
              icon.classList.remove('bi-eye-slash');
              icon.classList.add('bi-eye');
          }
      }
      </script>

    </div>

  </div>
</div>

{% endblock %}
